nav:
  - label: 🚀 Publish Site
    url: https://github.com/hassan-anees/hassananees/actions/workflows/deploy-cloudflare.yml
    
media:
  - name: images
    label: Images
    input: src/assets
    output: ../../assets
  - name: documents
    label: Documents
    input: public/documents
    output: ../../../public/documents
  - name: covers
    label: Covers
    input: public/covers
    output: ../../../public/covers
content:
  - name: work
    label: Work
    type: collection
    path: src/content/work
    filename: '{primary}.md'
    view:
      fields: [title, organization, period, category]
      primary: title
    fields:
      - name: title
        label: Title
        type: string
      - name: organization
        label: Organization
        type: string
      - name: period
        label: Period
        type: string
      - name: category
        label: Category
        type: select
        options:
          values:
            - value: industry
              label: Industry
            - value: research
              label: Research

  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    filename: '{primary}.md'
    view:
      fields: [ cover, title, body, date, published, pubDate, draft ] # title is the first entry and thus will be set to primary
    fields:
      - name: author
        label: Author
        type: string
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string
      - name: pubDate
        label: Publish Date
        type: date
        options:
          format: yyyy-MM-dd
      - name: draft
        label: Draft
        type: boolean
        default: true
      - name: cover
        label: Cover Image
        type: image
        options:
          multiple: false
          media: covers
      - name: attachments
        label: Attachments
        type: file
        options:
          multiple: true
          media: documents
      - name: body
        label: Body
        type: rich-text
    
